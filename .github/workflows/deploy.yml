name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        # Vite inlines VITE_* env vars into the bundle at build time, so the
        # prod frontend calls https://ryanpp-api.onrender.com/api/*.
        # Override by setting an `API_BASE_URL` repo variable if the Render
        # service gets a different URL.
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL || 'https://ryanpp-api.onrender.com' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
